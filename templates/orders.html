<!DOCTYPE html>
<html>
<head>
    <title>訂單管理</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        form { margin: 20px 0; padding: 20px; background: #f9f9f9; border-radius: 5px; }
        input, select { margin: 5px; padding: 5px; }
        button { padding: 5px 15px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📋 訂單管理</h1>
    <a href="/">← 回首頁</a>
    
    <form method="POST" action="/add_order">
        <h3>新增訂單（簡化版，含一筆明細）</h3>
        顧客：
        <select name="customer_id" required>
            <option value="">請選擇顧客</option>
            {% for c in customers %}
            <option value="{{ c.id }}">{{ c.id }} - {{ c.name }}</option>
            {% endfor %}
        </select>
        下單日期：<input type="date" name="order_date" required>
        交貨日期：<input type="date" name="delivery_date">
        交貨地點：<input type="text" name="delivery_place">
        總金額：<input type="number" name="total_amount" step="0.01" required>
        <hr>
        產品：
        <select name="product_id" required>
            <option value="">請選擇產品</option>
            {% for p in products %}
            <option value="{{ p.id }}">{{ p.id }} - {{ p.name }}</option>
            {% endfor %}
        </select>
        數量：<input type="number" name="quantity" required>
        售價：<input type="number" name="price" step="0.01" required>
        <button type="submit">新增訂單</button>
    </form>
    
    <table>
        <tr>
            <th>訂單編號</th><th>顧客</th><th>下單日期</th>
            <th>交貨日期</th><th>交貨地點</th><th>總金額</th>
        </tr>
        {% for o in orders %}
        <tr>
            <td>{{ o.id }}</td>
            <td>{{ o.customer_name }}</td>
            <td>{{ o.order_date }}</td>
            <td>{{ o.delivery_date }}</td>
            <td>{{ o.delivery_place }}</td>
            <td>{{ o.total_amount }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
