<!DOCTYPE html>
<html>
<head>
    <title>產品管理</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        form { margin: 20px 0; padding: 20px; background: #f9f9f9; border-radius: 5px; }
        input { margin: 5px; padding: 5px; }
        button { padding: 5px 15px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📦 產品管理</h1>
    <a href="/">← 回首頁</a>
    
    <form method="POST" action="/add_product">
        <h3>新增產品</h3>
        名稱：<input type="text" name="name" required>
        單價：<input type="number" name="price" step="0.01" required>
        <button type="submit">新增</button>
    </form>
    
    <table>
        <tr><th>編號</th><th>名稱</th><th>單價</th></tr>
        {% for p in products %}
        <tr><td>{{ p.id }}</td><td>{{ p.name }}</td><td>{{ p.price }}</td></tr>
        {% endfor %}
    </table>
</body>
</html>
